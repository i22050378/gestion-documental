name: gestion-documental

# ============================================================
#  UN SOLO docker-compose.yml orquesta TODO el sistema,
#  con los contenedores agrupados POR MODULO (redes privadas).
#  Una red comun ("backbone_net") conecta las APIs de los modulos.
#
#  Ejecuta SIEMPRE desde esta carpeta (docker):
#      docker compose up -d            (levanta lo que ya exista)
#      docker compose up -d --build    (reconstruye imagenes propias, ej. PHP)
# ============================================================

services:

  # ============================================================
  #  GRUPO 1 - MODULO CENTRAL   (.NET 10 MVC + SQL Server)
  # ============================================================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: gd_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: ${MSSQL_PID}
    ports:
      - "${MSSQL_PORT}:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    networks:
      - central_net
    restart: unless-stopped

  # (Fase 8) La app .NET se contenedorizara aqui (por ahora corre en el host).

  # ============================================================
  #  GRUPO 2 - MODULO DE CONSULTA   (PHP 8 MVC + PostgreSQL)
  # ============================================================
  postgres:
    image: postgres:16
    container_name: gd_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../db/postgres:/docker-entrypoint-initdb.d:ro
    networks:
      - consulta_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # La app PHP (Modulo de Consulta). Se construye desde su Dockerfile.
  app-php:
    build: ../src/php-app
    container_name: gd_php
    environment:
      DB_HOST: postgres            # nombre del servicio en la red consulta_net
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      CENTRAL_URL: http://host.docker.internal:5080   # asi el contenedor alcanza al .NET del host
      API_KEY: clave-interna-2026                      # debe coincidir con appsettings del .NET
    ports:
      - "8080:8080"
    volumes:
      - ../src/php-app:/app        # montaje en vivo: editas y se refleja sin reconstruir
    networks:
      - consulta_net               # para hablar con postgres
      - backbone_net               # para comunicarse con los otros modulos por API
    extra_hosts:
      - "host.docker.internal:host-gateway"   # permite resolver al host desde el contenedor
    depends_on:
      - postgres
    restart: unless-stopped

  # ============================================================
  #  GRUPO 3 - MODULO DE INDEXACION   (Node.js + TypeScript + MongoDB)
  # ============================================================
  mongo:
    image: mongo:7
    container_name: gd_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo_data:/data/db
      - ../db/mongo:/docker-entrypoint-initdb.d:ro
    networks:
      - indexacion_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet -u $${MONGO_INITDB_ROOT_USERNAME} -p $${MONGO_INITDB_ROOT_PASSWORD} --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 })' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # (Fase 8) La app Node se contenedorizara aqui (por ahora corre en el host).


# ---------- Volumenes con nombre (datos persistentes) ----------
volumes:
  mssql_data:
  pg_data:
  mongo_data:

# ---------- Redes ----------
networks:
  central_net:
    driver: bridge
  consulta_net:
    driver: bridge
  indexacion_net:
    driver: bridge
  backbone_net:
    driver: bridge
