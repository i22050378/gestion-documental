name: gestion-documental

# ============================================================
#  UN SOLO docker-compose.yml orquesta TODO el sistema,
#  pero los contenedores estan agrupados POR MODULO.
#
#  Cada modulo = su aplicacion + su base de datos, en su
#  PROPIA red privada (la base queda aislada ahi, para que
#  ningun otro modulo la toque directamente). Una red comun
#  ("backbone_net") conecta SOLO las APIs de los modulos.
#
#  Estado actual: solo las bases de datos. Las apps llegan en
#  sus fases; abajo quedan comentadas para ver a que red se
#  conectaran cuando existan.
#
#  Ejecuta SIEMPRE desde esta carpeta (docker):
#      docker compose up -d
# ============================================================

services:

  # ============================================================
  #  GRUPO 1 - MODULO CENTRAL   (.NET 10 MVC + SQL Server)
  #  Login, usuarios, roles, flujo de aprobacion, versiones, bitacora
  # ============================================================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: gd_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: ${MSSQL_PID}
    ports:
      - "${MSSQL_PORT}:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    networks:
      - central_net            # aislada dentro del modulo Central
    restart: unless-stopped

  # (Fase 3) La app .NET se sumara a este mismo grupo:
  #   app-dotnet:
  #     build: ../src/dotnet-core
  #     networks:
  #       - central_net        # para hablar con sqlserver
  #       - backbone_net       # para llamar a las APIs de los otros modulos
  #     depends_on:
  #       - sqlserver

  # ============================================================
  #  GRUPO 2 - MODULO DE CONSULTA   (PHP 8 MVC + PostgreSQL)
  #  Consulta de documentos vigentes, descargas, reportes
  # ============================================================
  postgres:
    image: postgres:16
    container_name: gd_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../db/postgres:/docker-entrypoint-initdb.d:ro
    networks:
      - consulta_net           # aislada dentro del modulo Consulta
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # (Fase 7) La app PHP se sumara a este mismo grupo:
  #   app-php:
  #     build: ../src/php-app
  #     networks:
  #       - consulta_net       # para hablar con postgres
  #       - backbone_net       # para consumir las APIs de los otros modulos
  #     depends_on:
  #       - postgres

  # ============================================================
  #  GRUPO 3 - MODULO DE INDEXACION   (Node.js + TypeScript + MongoDB)
  #  Busqueda rapida, metadatos, etiquetas
  # ============================================================
  mongo:
    image: mongo:7
    container_name: gd_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo_data:/data/db
      - ../db/mongo:/docker-entrypoint-initdb.d:ro
    networks:
      - indexacion_net         # aislada dentro del modulo Indexacion
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet -u $${MONGO_INITDB_ROOT_USERNAME} -p $${MONGO_INITDB_ROOT_PASSWORD} --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 })' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # (Fase 6) La app Node se sumara a este mismo grupo:
  #   app-node:
  #     build: ../src/node-service
  #     networks:
  #       - indexacion_net     # para hablar con mongo
  #       - backbone_net       # para exponer su API a los otros modulos
  #     depends_on:
  #       - mongo


# ---------- Volumenes con nombre (datos persistentes) ----------
volumes:
  mssql_data:
  pg_data:
  mongo_data:

# ---------- Redes ----------
#  Una red PRIVADA por modulo: ahi viven, aislados, la app y la base
#  de ese modulo (asi ninguna base toca directamente a otra).
#  Una red COMUN ("backbone_net"): el pasillo donde, mas adelante,
#  las apps se hablaran entre si por API.
networks:
  central_net:
    driver: bridge
  consulta_net:
    driver: bridge
  indexacion_net:
    driver: bridge
  backbone_net:
    driver: bridge
